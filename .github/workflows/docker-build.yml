name: Build, Test and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Upstream branch or tag to build
        required: false
        default: main
  repository_dispatch:
    types:
      - upstream-update

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event_name }}-${{ github.event.client_payload.sha || github.event.client_payload.ref || github.ref_name || github.run_id }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/lloesche/valheim-server
  UPSTREAM_PATH: upstream
  UPSTREAM_REPOSITORY: community-valheim-tools/valheim-server-docker

jobs:
  prepare:
    name: Resolve Upstream Source
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      requested_ref: ${{ steps.request.outputs.ref }}
      checkout_ref: ${{ steps.request.outputs.checkout_ref }}
      source_sha: ${{ steps.source.outputs.sha }}
      source_short_sha: ${{ steps.source.outputs.short_sha }}
      source_tag: ${{ steps.source.outputs.tag }}
      is_release_tag: ${{ steps.source.outputs.is_release_tag }}
    steps:
      - name: Resolve upstream ref
        id: request
        shell: bash
        run: |
          ref="main"
          checkout_ref=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.upstream_ref }}" ]; then
            ref="${{ github.event.inputs.upstream_ref }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ] && [ -n "${{ github.event.client_payload.ref }}" ]; then
            ref="${{ github.event.client_payload.ref }}"
          fi

          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ -n "${{ github.event.client_payload.sha }}" ]; then
            checkout_ref="${{ github.event.client_payload.sha }}"
          else
            checkout_ref="$ref"
          fi

          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

      - name: Check out upstream source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          ref: ${{ steps.request.outputs.checkout_ref }}
          path: ${{ env.UPSTREAM_PATH }}
          fetch-depth: 0

      - name: Capture upstream revision details
        id: source
        working-directory: ${{ env.UPSTREAM_PATH }}
        shell: bash
        run: |
          sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          tag=""
          is_release_tag=false

          case "${{ steps.request.outputs.ref }}" in
            refs/tags/v*)
              tag="${{ steps.request.outputs.ref }}"
              tag="${tag#refs/tags/}"
              is_release_tag=true
              ;;
            v*)
              if git rev-parse -q --verify "refs/tags/${{ steps.request.outputs.ref }}" >/dev/null; then
                tag="${{ steps.request.outputs.ref }}"
                is_release_tag=true
              fi
              ;;
          esac

          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "is_release_tag=$is_release_tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build Docker Image for Testing
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out upstream source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.source_sha }}
          path: ${{ env.UPSTREAM_PATH }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for testing
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.UPSTREAM_PATH }}
          platforms: linux/amd64
          load: true
          push: false
          build-args: SOURCE_COMMIT=${{ needs.prepare.outputs.source_sha }}
          tags: valheim-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image to tarball
        run: docker save -o valheim-test.tar valheim-test

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: valheim-test-image
          path: valheim-test.tar
          retention-days: 1

  test:
    name: Run Test Matrix
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        config:
          - name: default
            env: ""
          - name: valheim_plus
            env: "-e VALHEIM_PLUS=true"
          - name: bepinex
            env: "-e BEPINEX=true"
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: valheim-test-image

      - name: Load Docker image from tarball
        run: docker load -i valheim-test.tar

      - name: Run container with ${{ matrix.config.name }} settings
        run: |
          docker run -d --rm \
            --name valheim-test-${{ matrix.config.name }} \
            --cap-add=sys_nice \
            --stop-timeout 120 \
            -p 2456-2457:2456-2457/udp \
            -e SERVER_NAME="My Server" \
            -e WORLD_NAME="Neotopia" \
            -e SERVER_PASS=secret \
            ${{ matrix.config.env }} \
            valheim-test
          docker exec valheim-test-${{ matrix.config.name }} /usr/local/bin/valheim-tests "${{ matrix.config.name }}"

  build_and_push:
    name: Build and Push Docker Image
    if: github.event_name != 'pull_request'
    needs:
      - prepare
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out upstream source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.source_sha }}
          path: ${{ env.UPSTREAM_PATH }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Prepare image metadata
        id: meta
        shell: bash
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          REQUESTED_REF: ${{ needs.prepare.outputs.requested_ref }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
          SOURCE_SHORT_SHA: ${{ needs.prepare.outputs.source_short_sha }}
          SOURCE_TAG: ${{ needs.prepare.outputs.source_tag }}
          IS_RELEASE_TAG: ${{ needs.prepare.outputs.is_release_tag }}
        run: |
          tags="${IMAGE_NAME}:sha-${SOURCE_SHORT_SHA}"

          if [ "$IS_RELEASE_TAG" = "true" ]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:${SOURCE_TAG}"
          elif [ "$REQUESTED_REF" = "main" ] || [ "$REQUESTED_REF" = "refs/heads/main" ]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:latest"
          fi

          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=valheim-server"
            echo "org.opencontainers.image.description=Legacy GHCR mirror for the Valheim Server image"
            echo "org.opencontainers.image.url=https://github.com/community-valheim-tools/valheim-server-docker"
            echo "org.opencontainers.image.source=https://github.com/community-valheim-tools/valheim-server-docker"
            echo "org.opencontainers.image.version=$SOURCE_SHA"
            echo "org.opencontainers.image.revision=$SOURCE_SHA"
            echo "org.opencontainers.image.licenses=Apache-2.0"
            echo "org.opencontainers.image.documentation=https://github.com/community-valheim-tools/valheim-server-docker/blob/main/README.md"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.UPSTREAM_PATH }}
          platforms: linux/amd64
          push: true
          build-args: SOURCE_COMMIT=${{ needs.prepare.outputs.source_sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
